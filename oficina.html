  .tl-item { position: relative; padding-bottom: 16px; }

  .tl-date { font-size: 11px; color: var(--text-3); }

  .empty { text-align: center; padding: 40px; color: var(--text-3); }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .kanban { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>

        }, t === 'resumen' ? 'Resumen' : t === 'disputas' ? 'Disputas' : 'Notas'))

        React.createElement('div', { style: { textAlign: 'center', marginBottom: 16 } },
          React.createElement('span', { className: `${scoreColor(cliente.scoreActual)}`, style: { fontWeight: 700 } }, scoreLabel(cliente.scoreActual)),

      ),
      React.createElement('div', { className:'content' },
        page==='resumen' && React.createElement(ResumenView, { clientes, onVerCliente:setClienteSeleccionado, onNuevo:()=>setShowNuevo(true) }),
        page==='kanban' && React.createElement(KanbanView, { clientes, onVerCliente:setClienteSeleccionado }),
        page==='clientes' && React.createElement(ClientesView, { clientes, onVerCliente:setClienteSeleccionado, onNuevo:()=>setShowNuevo(true), onImportar:()=>setShowImportar(true) }),
        page==='cobros' && React.createElement(CobrosView, { clientes })
      )
    ),

    clienteSeleccionado && React.createElement(ModalCliente, { cliente:clienteSeleccionado, onClose:()=>setClienteSeleccionado(null), onGuardarNota:handleGuardarNota }),
    showNuevo && React.createElement(ModalNuevoCliente, { onClose:()=>setShowNuevo(false), onSave:()=>setClientes(DEMO_CLIENTES) }),
    showImportar && React.createElement(ModalImportar, { onClose:()=>setShowImportar(false) })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
