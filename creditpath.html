<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<title>CreditPath — Monitor de Oficina</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<style>
:root {
  --navy:#0A1628;--navy2:#FFFFFF;--navy3:#F8F5EE;
  --gold:#D4A843;--gold2:#F0C865;
  --green:#22C55E;--red:#EF4444;--yellow:#F59E0B;--blue:#3B82F6;--purple:#A855F7;
  --t:#0A1628;--t2:#4A5568;--t3:#718096;
  --b:#E2E8F0;--b2:#EDF2F7;
  --s:#F7FAFC;--s2:#EDF2F7;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--navy3);color:var(--t);min-height:100vh;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,select,textarea{font-family:inherit;outline:none;font-size:14px;}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);}
.lb{background:#FFFFFF;border:1px solid var(--b);border-radius:16px;padding:44px 40px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.4);}
.ll{font-size:26px;font-weight:800;color:var(--t);text-align:center;margin-bottom:4px;}
.ll span{color:var(--gold);}
.lr{text-align:center;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;}
.li{width:100%;background:#F8F5EE;border:1px solid var(--b);border-radius:var(--rs);padding:12px 14px;color:var(--t);font-size:14px;margin-bottom:14px;transition:border-color 0.2s;}
.li:focus{border-color:var(--gold);}
.llab{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
.lbtn{width:100%;background:var(--gold);color:var(--navy);font-size:15px;font-weight:700;padding:14px;border-radius:var(--rs);margin-top:6px;transition:background 0.15s;}
.lbtn:hover{background:var(--gold2);}
.lerr{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:#FCA5A5;margin-bottom:14px;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sb{width:224px;background:var(--navy);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;}
.sbt{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1);}
.sbb2{font-size:18px;font-weight:800;color:#FFFFFF;}
.sbb2 span{color:var(--gold);}
.sbo{font-size:11px;color:var(--t2);margin-top:4px;}
.sbn{flex:1;padding:10px 0;overflow-y:auto;}
.nss{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.35);padding:12px 20px 4px;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:rgba(255,255,255,0.55);cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;}
.ni:hover{background:rgba(255,255,255,0.06);color:#FFFFFF;}
.ni.active{background:rgba(212,168,67,0.08);color:var(--gold);border-left-color:var(--gold);}
.nic{font-size:15px;width:18px;text-align:center;}
.sbb{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1);}
.sob{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;background:none;transition:color 0.15s;width:100%;}
.sob:hover{color:var(--red);}

/* MAIN */
.mn{flex:1;overflow-y:auto;}
.tb{height:56px;background:#FFFFFF;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10;}
.tbt{font-size:15px;font-weight:600;}
.ct{padding:28px;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.sc{background:#FFFFFF;border:1px solid var(--b);border-radius:var(--r);padding:20px;}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);margin-bottom:10px;}
.sv{font-size:28px;font-weight:800;line-height:1;}
.sv.gold{color:var(--gold);}
.sv.green{color:var(--green);}
.sv.yellow{color:var(--yellow);}
.sn{font-size:12px;color:var(--t3);margin-top:6px;}

/* CARD */
.cd{background:#FFFFFF;border:1px solid var(--b);border-radius:var(--r);padding:24px;margin-bottom:20px;}
.cdh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.cdt{font-size:14px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}

/* KANBAN */
.kb{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kc{background:#EDF2F7;border-radius:var(--rs);padding:12px;min-height:180px;}
.kh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);margin-bottom:10px;display:flex;justify-content:space-between;}
.kk{background:#FFFFFF;border:1px solid var(--b);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;}
.kk:hover{border-color:var(--gold);transform:translateY(-1px);}
.kn{font-size:13px;font-weight:600;}
.km{font-size:11px;color:var(--t3);margin-top:3px;}
.ks{font-size:12px;font-weight:700;margin-top:6px;}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);border-bottom:1px solid var(--b);}
td{padding:13px 14px;border-bottom:1px solid var(--b2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--s);}

/* BADGES */
.bgg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.bg-green{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.bg-yellow{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.2);}
.bg-red{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.bg-blue{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.2);}
.bg-purple{background:rgba(168,85,247,0.1);color:var(--purple);border:1px solid rgba(168,85,247,0.2);}
.bg-gold{background:rgba(212,168,67,0.1);color:var(--gold);border:1px solid rgba(212,168,67,0.2);}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:var(--s2);color:var(--t2);border:1px solid var(--b);}
.btn-ghost:hover{color:var(--t);}
.btn-sm{padding:6px 12px;font-size:12px;}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.md{background:#FFFFFF;border:1px solid var(--b);border-radius:16px;padding:32px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;}
.mdt{font-size:18px;font-weight:700;margin-bottom:4px;}
.mds{font-size:13px;color:var(--t2);margin-bottom:20px;}

/* FORM */
.fg{margin-bottom:14px;}
.fl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.fi{width:100%;background:#F8F5EE;border:1px solid var(--b);border-radius:var(--rs);padding:11px 14px;color:var(--t);font-size:14px;transition:border-color 0.2s;}
.fi:focus{border-color:var(--gold);outline:none;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* TIMELINE */
.tl{position:relative;padding-left:20px;}
.tl::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--b);}
.tli{position:relative;padding-bottom:16px;}
.tld{position:absolute;left:-17px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:2px solid var(--navy2);}
.tldt{font-size:11px;color:var(--t3);}
.tlt{font-size:13px;color:var(--t);margin-top:2px;}

/* SCORE */
.dw{display:flex;flex-direction:column;align-items:center;padding:8px 0;}
.sc-bad{color:var(--red);}
.sc-fair{color:var(--yellow);}
.sc-good{color:var(--blue);}
.sc-ex{color:var(--green);}

/* HERRAMIENTAS */
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.hcard{background:#FFFFFF;border:1px solid var(--b);border-radius:var(--r);padding:22px;cursor:pointer;transition:all 0.2s;text-align:center;}
.hcard:hover{border-color:var(--gold);background:rgba(212,168,67,0.05);transform:translateY(-2px);}
.hicon{font-size:32px;margin-bottom:10px;}
.htitle{font-size:14px;font-weight:700;color:var(--t);margin-bottom:4px;}
.hdesc{font-size:12px;color:var(--t3);line-height:1.5;}

/* PROMPT CARDS */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.pcard{background:#F8F5EE;border:1px solid var(--b);border-radius:var(--r);padding:18px;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:12px;}
.pcard:hover{border-color:var(--gold);background:rgba(212,168,67,0.05);}
.picon{font-size:22px;flex-shrink:0;}
.ptitle{font-size:13px;font-weight:700;color:var(--t);margin-bottom:3px;}
.pdesc{font-size:11px;color:var(--t3);line-height:1.4;}
.pcopy{margin-top:8px;font-size:11px;color:var(--gold);font-weight:600;}

/* DIRECTORIO */
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.dcard{background:#FFFFFF;border:1px solid var(--b);border-radius:var(--r);padding:16px;}
.dname{font-size:13px;font-weight:700;color:var(--t);margin-bottom:4px;}
.ddesc{font-size:11px;color:var(--t3);line-height:1.4;margin-bottom:10px;}
.dbtn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--gold);background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.2);border-radius:6px;padding:4px 10px;cursor:pointer;transition:all 0.15s;}
.dbtn:hover{background:rgba(212,168,67,0.2);}

/* CARTA */
.cbox{background:#F8F5EE;border:1px solid var(--b);border-radius:var(--r);padding:20px;font-family:monospace;font-size:12px;color:var(--t2);line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-bottom:16px;}

/* STEPS */
.steps{display:flex;gap:8px;margin-bottom:20px;}
.step{flex:1;padding:9px;border-radius:8px;text-align:center;font-size:12px;font-weight:600;border:1px solid var(--b);color:var(--t3);background:#EDF2F7;transition:all 0.15s;}
.step.active{background:rgba(212,168,67,0.1);border-color:var(--gold);color:var(--gold);}
.step.done{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);color:var(--green);}

/* NOTA */
.nota{background:#F8F5EE;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.nota-m{font-size:11px;color:var(--t3);margin-bottom:4px;}
.nota-t{font-size:13px;color:var(--t);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:20px;}
.tab{padding:8px 18px;font-size:13px;font-weight:500;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600;}

.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--t3);font-size:14px;}
.empty{text-align:center;padding:40px;color:var(--t3);}
.tip{background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:16px;}
.tip strong{color:var(--gold);}
.warn{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#FCA5A5;line-height:1.6;margin-bottom:16px;}

@media(max-width:900px){
  .sg{grid-template-columns:1fr 1fr;}
  .kb{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .hgrid{grid-template-columns:1fr 1fr;}
  .pgrid{grid-template-columns:1fr;}
  .dgrid{grid-template-columns:1fr 1fr;}
  .sb{display:none;}
}
</style>
</head>

<script type="text/babel">

const scColor=s=>s<580?'sc-bad':s<670?'sc-fair':s<740?'sc-good':'sc-ex';
const scLabel=s=>s<580?'Malo':s<670?'Regular':s<740?'Bueno':'Excelente';
const fm=n=>'$'+(n||0).toLocaleString('en-US');

// ── PROMPTS DATA ───────────────────────────────────────────────────────────
const PROMPTS=[
{id:1,icon:'🔬',title:'Reparar Mi Crédito',desc:'Análisis forense completo + carta de disputa + Metro 2',tag:'Principal',
prompt:`Act as a highly skilled credit report analyst, Metro 2 compliance expert, and bilingual dispute-letter writer (English and Spanish). I will provide my credit report(s) from one or more bureaus (Equifax, Experian, TransUnion). Perform a forensic-style review with maximum detail.

STEP 1 — FULL CREDIT AUDIT:
Identify ALL derogatory accounts, late payments, collections, charge-offs, repossessions, bankruptcies, public records, judgments. Flag Metro 2 format violations (🔴 METRO 2 VIOLATION), duplicate accounts (📋 MULTI-BUREAU), re-aged items past 7 years (⚠️ EXPIRED — DEMAND REMOVAL), unauthorized inquiries (🔍 UNAUTHORIZED).

STEP 2 — PRIORITY SCORING:
For each item assign: Impact Level (High/Medium/Low), Dispute Strength (Strong/Moderate/Weak), Expiration Date, Recommended Action. Sort highest to lowest impact.

STEP 3 — DISPUTE LETTERS (one per bureau):
Write separate letters for Equifax, Experian, TransUnion. Each must: cite FCRA §611 and §623, reference Metro 2 violations, demand deletion or correction within 30 days, include Certified Mail reference.

STEP 4 — SPANISH VERSION:
Translate the most important dispute letter into professional Spanish.

STEP 5 — ACTION PACKAGE:
Bureau mailing checklist, document checklist, summary of strongest dispute points, estimated score impact.

Do not begin until I provide the credit report(s).`},

{id:2,icon:'⚖️',title:'Records Públicos',desc:'Estrategia LexisNexis + carta de disputa para bancarrotas y gravámenes',tag:'Avanzado',
prompt:`PASO CRÍTICO ANTES DE ENVIAR CUALQUIER CARTA:
Llama a LexisNexis al 1-800-456-1244 y pide que bloqueen tu record público ANTES de disputar con los bureaus. Esto es esencial porque LexisNexis es la fuente que los bureaus consultan para verificar records públicos.

---

Act as an FCRA compliance expert specializing in public records disputes. I will provide my credit report. Your task:

STEP 1 — IDENTIFY ALL PUBLIC RECORDS:
- Bankruptcies (Chapter 7: 10 years; Chapter 13: 7 years)
- Civil judgments
- Tax liens
- Child support
- Foreclosures

For each item: report exact date, calculate exact expiration date, assess if re-aged or inaccurate.

STEP 2 — LEXISNEXIS BLOCK STRATEGY:
Draft a formal written request to LexisNexis demanding removal of public records under FCRA §605 and §605B. Include their address: LexisNexis Consumer Center, P.O. Box 105108, Atlanta, GA 30348.

STEP 3 — BUREAU DISPUTE LETTERS:
Write dispute letters to all three bureaus citing that the public record cannot be verified independently without LexisNexis data, and demanding deletion if LexisNexis has blocked/removed the record.

STEP 4 — FOLLOW-UP TIMELINE:
Day 0: Call LexisNexis + send written block request.
Day 7: Send dispute letters to all 3 bureaus.
Day 37: Follow up if not resolved.
Day 45: Escalate to CFPB if still unresolved.

Do not begin until I upload my credit report.`},

{id:3,icon:'🔍',title:'Borrar Inquiries',desc:'Disputa de consultas no autorizadas — hard pulls y unauthorized inquiries',tag:'Rápido',
prompt:`Act as an FCRA compliance expert specializing in hard inquiry disputes.

STEP 1 — IDENTIFY DISPUTABLE INQUIRIES:
Review all hard inquiries and flag: unauthorized inquiries (no credit application submitted), inquiries older than 2 years (must be removed by law), duplicate inquiries from same creditor, inquiries with incorrect dates.

DO NOT dispute: inquiries from accounts currently open and recognized, soft pulls, employer inquiries from jobs applied for.

STEP 2 — PRIORITY LIST:
Sort inquiries by: (1) unauthorized, (2) expired 2+ years, (3) duplicate. Estimate score impact of removing each.

STEP 3 — DISPUTE LETTERS (one per bureau):
For each bureau, write a dispute letter citing FCRA §604 — unauthorized access to credit file. Include exact inquiry name, date, and reason for dispute. Reference that no permissible purpose existed.

STEP 4 — DIRECT CREDITOR LETTERS:
Write letters to each creditor that made unauthorized inquiries demanding they instruct the bureaus to remove the inquiry.

STEP 5 — PHONE SCRIPT:
Provide a script to call each bureau and follow up after 30 days. Include: what to say, who to ask for (supervisor), what to demand if not resolved.

IMPORTANT: If bureau does not respond within 30 days, the item must be removed automatically under FCRA. Include this demand in all letters.

Do not begin until I provide my credit report.`},

{id:4,icon:'💬',title:'Negociación de Deudas',desc:'Script completo para negociar al 20% + acuerdo pay-for-delete',tag:'Avanzado',
prompt:`Act as a debt negotiation strategist. I will provide details about my debt(s). Your task:

STEP 1 — DEBT ANALYSIS:
Identify: original creditor vs. debt collector, age of debt (statute of limitations by state), whether debt is past the credit reporting period (7 years), likelihood of successful negotiation.

STEP 2 — NEGOTIATION STRATEGY:
Provide a step-by-step negotiation plan starting at 20% of balance. Include:
- Opening offer strategy
- Counter-offer ranges (20% → 30% → 40% maximum)
- Pressure arguments (bankruptcy Chapter 7, statute of limitations)
- Pay-for-delete demand (removal from all 3 bureaus as condition of payment)

STEP 3 — PHONE SCRIPT (in Spanish):
APERTURA: "Mi nombre es [NOMBRE] llamando sobre la cuenta [#]. Quiero resolver esta deuda pero primero debo explicarles mi situación."
PRESIÓN BANCARROTA: "Estoy considerando Capítulo 7. Si eso ocurre, no recibirán nada. Prefiero resolver esto ahora."
OFERTA: "Puedo ofrecer el 20% como pago único y final, pero SOLO si eliminan esta cuenta de los tres bureaus. Sin eliminación, no hay trato."
CIERRE: "Necesito confirmación escrita antes de cualquier pago — por email o correo certificado — especificando el monto, que es pago total, y el compromiso de eliminar de Equifax, Experian y TransUnion."

STEP 4 — PAY-FOR-DELETE AGREEMENT TEMPLATE:
Draft a written agreement template the collector must sign before any payment is made.

STEP 5 — GOLDEN RULES:
⚠️ NEVER pay before receiving written agreement
⚠️ ONLY pay by personal check — never card or wire transfer
⚠️ Agreement MUST specify deletion from all 3 bureaus
⚠️ Keep ALL documents — emails, letters, cancelled check
⚠️ If they refuse deletion — NO DEAL

Do not begin until I provide my debt details.`},

{id:5,icon:'📄',title:'Segunda Carta de Disputa',desc:'Follow-up con Method of Verification demand para ítems no resueltos',tag:'Seguimiento',
prompt:`MASTER PROMPT — Second Notice of Dispute Letter

You are a consumer credit analyst and FCRA compliance writer. Draft a "Second Notice of Dispute & Method of Verification Demand" targeting remaining derogatory items after a first dispute round.

INPUTS NEEDED (provide or upload):
- Full name, current address, former addresses if applicable, DOB, last 4 SSN, phone, email
- Report date, confirmation number, bureau(s) involved
- Date of first dispute sent, date of bureau response (if any)
- Remaining items: bureau (EX/EQ/TU), furnisher/collector, account # last 4, current status, reason code

REASON CODES: not mine / identity mismatch / duplicate / re-aged DOFD / balance inaccurate / payment history mismatch / incorrect status after payoff / unverifiable / impermissible inquiry / obsolete (>7 yrs)

OUTPUT — One letter per bureau:
1. My contact block + bureau address
2. Subject: "Second Notice of Dispute – Method of Verification Demand" + Report # + Date
3. Opening paragraph referencing first dispute date and their response (or lack thereof)
4. Issue Index (numbered) — for each item: furnisher, account ending ####, reported status, reason, quoted evidence from report, requested remedy (delete or correct), exhibits list
5. Legal basis: FCRA §611(a)(6)(B)(iii) & §611(a)(7) — demand name, address, phone of each furnisher and exact records used to verify
6. Demands within 30 days: updated report, written Method of Verification, notices to all furnishers
7. Closing with Certified Mail reference
8. Signature block + enclosures list

STYLE: Professional, firm, no admission of debt. Redact account numbers to last 4.

Do not begin until I provide the remaining items and upload documents.`},

{id:6,icon:'✅',title:'Validación de Deuda',desc:'Paquete completo FDCPA §809 para detener cobros y exigir validación',tag:'Avanzado',
prompt:`Act as an FDCPA/FCRA compliance analyst. I will upload documents from a debt collector. Generate a complete Debt Validation Package.

INPUTS NEEDED: Full name, current address, DOB, last 4 SSN, collector name/address, date of first collector contact, state (important for Texas Cap. 392).

OUTPUT PACKAGE (in Spanish, print-ready):

A) EXECUTIVE SUMMARY (6-8 bullets): debts in validation, risks, key dates/deadlines.

B) OPERATIONAL CHECKLIST Day 0-45:
- Day 0: prepare DV letter, exhibits, certified mail
- Day 1-10: monitor delivery, log RRN tracking number
- Day 11-30: debt collection silence period — log any calls
- Day 31-45: evaluate response; if insufficient, send follow-up + dispute to bureaus + CFPB complaint

C) DEBT VALIDATION LETTER (FDCPA §809 / 15 U.S.C. §1692g):
- My address block + collector address block
- Subject: "Solicitud de Validación de Deuda y Cese de Cobranza"
- Dispute within 30 days, demand collection cease until validated
- Required: itemized balance breakdown, original creditor name/address, copy of original contract, chain of ownership/assignments, full accounting from origin to current balance
- All responses in writing; prohibit phone calls
- No admission of debt; account numbers last 4 only

D) EXHIBITS LIST: map each document to letter reference (A1, A2...)

E) FOLLOW-UP LETTER (30+ days / insufficient validation):
Demand Method of Verification, warn about FCRA §623 reporting violations, request removal if not properly verified.

F) TEXAS MODULE (if applicable):
Texas Finance Code Cap. 392 — prohibited practices, corrections under §392.202, complaints to Texas AG/OCCC.

G) EVIDENCE LOG TABLE:
Columns: Date | Type | Description | Tracking # | Exhibit | Next Step/Deadline

STYLE: Professional, firm, no debt admission. Certified Mail instruction on all letters.

Do not begin until I upload all collector documents.`},

// ── SCORE DIAL ─────────────────────────────────────────────────────────────
function Dial({score,size=160}){
  const pct=Math.min(1,Math.max(0,(score-300)/550));
  const ang=-180+pct*180;
  const cx=80,cy=76,r=60;
  const xy=(d,rd)=>({x:cx+rd*Math.cos(d*Math.PI/180),y:cy+rd*Math.sin(d*Math.PI/180)});
  const end=xy(ang,r);
  const large=ang>-90?1:0;
  const color=score<580?'#EF4444':score<670?'#F59E0B':score<740?'#3B82F6':'#22C55E';
  const needle=xy(ang-90,44);
  return React.createElement('div',{className:'dw'},
    React.createElement('svg',{width:size,height:size*0.58,viewBox:'0 0 160 93'},
      React.createElement('path',{d:'M20 76 A60 60 0 0 1 140 76',fill:'none',stroke:'rgba(255,255,255,0.08)',strokeWidth:12,strokeLinecap:'round'}),
      React.createElement('path',{d:`M20 76 A60 60 0 ${large} 1 ${end.x} ${end.y}`,fill:'none',stroke:color,strokeWidth:12,strokeLinecap:'round'}),
      React.createElement('line',{x1:cx,y1:cy,x2:needle.x,y2:needle.y,stroke:color,strokeWidth:2,strokeLinecap:'round'}),
      React.createElement('circle',{cx,cy,r:4,fill:color}),
      React.createElement('text',{x:cx,y:93,textAnchor:'middle',fontSize:22,fontWeight:800,fill:'#F1F5F9',fontFamily:'-apple-system,sans-serif'},score)
    )
  );
}

      ),
      React.createElement('div',{className:'sbb'},
        React.createElement('button',{className:'sob',onClick:()=>auth.signOut()},'→ Cerrar Sesión')
      )
    ),
    React.createElement('div',{className:'mn'},
      React.createElement('div',{className:'tb'},
        React.createElement('span',{className:'tbt'},titles[page]||''),
        React.createElement('div',{style:{display:'flex',gap:8}},
          React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>setPage('herramientas')},'🛠️ Herramientas'),
          React.createElement('button',{className:'btn btn-gold btn-sm',onClick:()=>setShowNuevo(true)},'+ Nuevo Cliente')
        )
      ),
      React.createElement('div',{className:'ct'},
        page==='panel'&&React.createElement(PanelView,{clientes,onVer:setClienteSel,onNuevo:()=>setShowNuevo(true)}),
        page==='kanban'&&React.createElement(KanbanView,{clientes,onVer:setClienteSel}),
        page==='clientes'&&React.createElement(ClientesView,{clientes,onVer:setClienteSel,onNuevo:()=>setShowNuevo(true)}),
        page==='cobros'&&React.createElement(CobrosView,{clientes}),
        page==='herramientas'&&React.createElement(HerramientasView,{clientes}),
        page==='portal'&&React.createElement(PortalView,{clientes}),
        page==='nuevo'&&React.createElement('div',null,React.createElement(ModalNuevo,{onClose:()=>setPage('clientes'),onSave:()=>{alert('✅ Cliente creado');setPage('clientes');}}))
      )
    ),
    clienteSel&&React.createElement(ModalCliente,{c:clienteSel,onClose:()=>setClienteSel(null),onNota:handleNota}),
    showNuevo&&React.createElement(ModalNuevo,{onClose:()=>setShowNuevo(false),onSave:()=>{alert('✅ Cliente creado');setShowNuevo(false);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
